<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" width="240" height="50">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square badge with "L" cutout -->
  <rect x="4" y="4" width="38" height="38" rx="10" fill="url(#cg)"/>
  <!-- White L inside -->
  <path d="M15 12 L15 32 L30 32 L30 27 L20 27 L20 12Z" fill="white"/>

  <!-- Text - all same weight, clean -->
  <text x="52" y="35" font-family="'Inter',system-ui,sans-serif" font-size="30" font-weight="700" fill="url(#cg)" letter-spacing="-1">lumied</text>

  <!-- Subtle underline accent -->
  <line x1="52" y1="40" x2="105" y2="40" stroke="url(#cg)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>