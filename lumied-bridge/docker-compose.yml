services:
  bridge:
    build: .
    image: lumied-bridge:latest
    container_name: lumied-bridge
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
