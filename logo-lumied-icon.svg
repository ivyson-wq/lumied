<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <radialGradient id="iconGlow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FCD34D;stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Glow background -->
  <circle cx="40" cy="40" r="35" fill="url(#iconGlow)"/>

  <!-- Bulb body -->
  <path d="M40 12 C22 12, 8 28, 8 44 C8 56, 16 66, 28 70 L28 82 L52 82 L52 70 C64 66, 72 56, 72 44 C72 28, 58 12, 40 12Z"
        fill="url(#iconGrad)" opacity="0.95"/>

  <!-- Light rays -->
  <line x1="40" y1="1" x2="40" y2="7" stroke="#FCD34D" stroke-width="3" stroke-linecap="round" filter="url(#softGlow)"/>
  <line x1="14" y1="16" x2="18" y2="21" stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round" filter="url(#softGlow)"/>
  <line x1="66" y1="16" x2="62" y2="21" stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round" filter="url(#softGlow)"/>
  <line x1="2" y1="44" x2="6" y2="44" stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round" filter="url(#softGlow)"/>
  <line x1="74" y1="44" x2="78" y2="44" stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- Book pages inside -->
  <path d="M40 32 L24 40 L24 60 L40 52Z" fill="white" opacity="0.9"/>
  <path d="M40 32 L56 40 L56 60 L40 52Z" fill="white" opacity="0.7"/>
  <line x1="40" y1="32" x2="40" y2="52" stroke="white" stroke-width="2" opacity="0.5"/>

  <!-- Bulb base -->
  <rect x="30" y="82" width="20" height="4" rx="1.5" fill="#475569"/>
  <rect x="32" y="86" width="16" height="4" rx="1.5" fill="#475569"/>
  <rect x="34" y="90" width="12" height="4" rx="2.5" fill="#475569"/>
</svg>