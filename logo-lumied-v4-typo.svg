<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" width="200" height="44">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="70%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0.3"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- "lumi" bold dark -->
  <text x="8" y="33" font-family="'Inter',system-ui,sans-serif"
        font-size="34" font-weight="800" fill="#1E293B" letter-spacing="-1.5">lumi</text>

  <!-- "ed" thin gradient -->
  <text x="112" y="33" font-family="'Inter',system-ui,sans-serif"
        font-size="34" font-weight="200" fill="url(#grad)" letter-spacing="-1.5">ed</text>

  <!-- Glowing dot replaces i dot - the "light" -->
  <circle cx="95" cy="10" r="5" fill="#FCD34D" opacity="0.15" filter="url(#glow)"/>
  <circle cx="95" cy="10" r="3.5" fill="url(#dot)" filter="url(#glow)"/>

  <!-- Subtle light beam from dot -->
  <line x1="89" y1="7" x2="86" y2="4" stroke="#FCD34D" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="95" y1="4" x2="95" y2="1" stroke="#FCD34D" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="101" y1="7" x2="104" y2="4" stroke="#FCD34D" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
</svg>