<!DOCTYPE html>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; min-height: 100vh; padding: 40px 20px; }
  h1 { text-align: center; color: #1e293b; margin-bottom: 10px; font-size: 28px; }

  .section { max-width: 1100px; margin: 0 auto 50px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
  .card { background: white; border-radius: 16px; padding: 36px 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; min-height: 140px; }
  .card.dark { background: #1e293b; }
  .card h3 { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; font-weight: 500; }
  .card.dark h3 { color: #475569; }
  .badge { display: inline-block; background: #DBEAFE; color: #1E40AF; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-left: 8px; }
