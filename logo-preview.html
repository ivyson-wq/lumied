<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Lumied — Logo Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; min-height: 100vh; padding: 40px 20px; }
  h1 { text-align: center; color: #1e293b; margin-bottom: 40px; font-size: 28px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
  .card { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .card.dark { background: #1e293b; }
  .card h3 { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; }
  .card.dark h3 { color: #64748b; }
  .card svg { max-width: 100%; height: auto; }
</style>
</head>

<div class="grid">

  <!-- Logo completa - fundo claro -->

          <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0"/>
        </radialGradient>
        <filter id="glow1"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <g transform="translate(28, 8)">
        <path d="M35 18 C20 18, 10 30, 10 42 C10 52, 16 60, 25 64 L25 75 L45 75 L45 64 C54 60, 60 52, 60 42 C60 30, 50 18, 35 18Z" fill="url(#g1)" opacity="0.9"/>

      <text x="248" y="72" font-family="'Inter',system-ui,sans-serif" font-size="52" font-weight="300" fill="url(#g1)" letter-spacing="-1.5">ed</text>
      <circle cx="218" cy="38" r="5" fill="url(#lg1)" filter="url(#glow1)"/>
    </svg>
  </div>
