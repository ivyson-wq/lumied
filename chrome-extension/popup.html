<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:340px;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#fafafa;}
.header{background:linear-gradient(135deg,#C8102E 0%,#9B0D23 100%);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:10px;}
.header h1{font-size:15px;font-weight:700;letter-spacing:-0.3px;}
.header svg{opacity:.9;}
.config{padding:16px 20px;}
.field{margin-bottom:12px;}
.field label{font-size:11px;font-weight:600;color:#6b7280;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;}
.field input{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;transition:border-color .15s,box-shadow .15s;background:#fff;}
.field input:focus{outline:none;border-color:#C8102E;box-shadow:0 0 0 3px rgba(200,16,46,.08);}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#C8102E 0%,#9B0D23 100%);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(200,16,46,.2);margin-top:4px;}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,16,46,.3);}
.btn:active{transform:translateY(0);}
.status{padding:12px 20px;font-size:11px;color:#6b7280;text-align:center;border-top:1px solid #f0f0f0;}
.status.connected{color:#065f46;background:#ecfdf5;}
.help{padding:0 20px 12px;font-size:10px;color:#9ca3af;line-height:1.5;}
.help a{color:#C8102E;text-decoration:none;}
</style>
</head>
<body>
<div class="header">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  <h1 id="extTitle">Lumied CRM</h1>
</div>
<div class="config">
  <div class="field">
    <label>URL do Sistema</label>
    <input type="text" id="apiUrl" placeholder="https://xxxxx.supabase.co">
  </div>
  <div class="field">
    <label>API Key</label>
    <input type="text" id="apiKey" placeholder="Supabase Anon Key">
  </div>
  <div class="field">
    <label>Token do Gerente</label>
    <input type="password" id="token" placeholder="Copie do localStorage: mb_token">
  </div>
  <button class="btn" onclick="salvar()">Salvar Configuracao</button>
</div>
<div class="help">
  No painel do gerente, abra o console (F12) e copie:<br>
  <code style="background:#f3f4f6;padding:2px 4px;border-radius:3px;">localStorage.getItem('mb_token')</code>
</div>
<div class="status" id="status">Configure para conectar ao CRM</div>
<script>
chrome.storage.local.get(['apiUrl','apiKey','token'], d => {
  if(d.apiUrl) document.getElementById('apiUrl').value = d.apiUrl;
  if(d.apiKey) document.getElementById('apiKey').value = d.apiKey;
  if(d.token) document.getElementById('token').value = d.token;
  if(d.apiUrl && d.token) {
    const el = document.getElementById('status');
    el.textContent = 'Conectado ao CRM';
    el.classList.add('connected');
    fetch(d.apiUrl + '/functions/v1/api', {
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':d.apiKey||'','Authorization':'Bearer '+(d.apiKey||'')},
      body:JSON.stringify({action:'config_publica'})
    }).then(r=>r.json()).then(cfg=>{
      if(cfg.escola_nome) document.getElementById('extTitle').textContent = cfg.escola_nome + ' CRM';
    }).catch(()=>{});
  }
});
function salvar() {
  chrome.storage.local.set({
    apiUrl: document.getElementById('apiUrl').value.trim(),
    apiKey: document.getElementById('apiKey').value.trim(),
    token: document.getElementById('token').value.trim(),
  }, () => {
    const el = document.getElementById('status');
    el.textContent = 'Salvo com sucesso!';
    el.classList.add('connected');
    setTimeout(() => { el.textContent = 'Conectado ao CRM'; }, 2000);
  });
}
</script>
</body>
</html>
