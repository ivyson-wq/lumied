<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maple Bear — Portal da Secretaria</title>
<meta name="theme-color" content="#1c1712">
<link rel="icon" href="/icon-apple.png">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#C8102E;--red-dark:#a00d24;--red-light:rgba(200,16,46,.08);--bg:#f0ece6;--sb:#1c1712;--white:#fff;--border:#e2dbd1;--text:#1a1a1a;--muted:#7a7169;--green:#2d7a3a;--blue:#1a6bb5;--gold:#d4830a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--sb);position:relative;overflow:hidden;}
#loginScreen::before{content:'🍁';position:absolute;font-size:320px;opacity:.03;top:-60px;right:-60px;line-height:1;pointer-events:none;}
.login-card{background:var(--white);border-radius:16px;padding:48px 44px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.35);position:relative;z-index:1;animation:popIn .4s cubic-bezier(.22,.8,.44,1);}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(12px);}to{opacity:1;transform:scale(1) translateY(0);}}
.login-logo{text-align:center;margin-bottom:28px;}.login-logo .leaf{font-size:40px;}
.login-logo h1{font-family:'Lora',serif;font-size:18px;margin-top:8px;color:var(--text);}
.login-logo span{font-size:12px;color:var(--muted);}
.login-card h2{font-family:'Lora',serif;font-size:20px;margin-bottom:22px;text-align:center;}
.lf{margin-bottom:16px;}.lf label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:7px;}
.lf input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;background:#fdfbf8;}
.lf input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,107,181,.1);}
.login-btn{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s;box-shadow:0 4px 16px rgba(26,107,181,.3);}
.login-btn:hover{background:#155a98;}.login-btn:disabled{opacity:.55;cursor:not-allowed;}
#loginError{display:none;font-size:13px;color:var(--red);text-align:center;margin-top:12px;padding:10px;background:#fdf0f2;border-radius:7px;border:1px solid rgba(200,16,46,.2);}

/* APP SHELL */
#appShell{display:none;min-height:100vh;}
.topbar{background:var(--blue);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-brand{display:flex;align-items:center;gap:12px;}
.topbar-brand .leaf{font-size:20px;}
.topbar-brand h1{font-family:'Lora',serif;font-size:15px;color:#fff;line-height:1.2;}
.topbar-brand span{font-size:11px;color:rgba(255,255,255,.5);}
.topbar-user{display:flex;align-items:center;gap:12px;}
.user-name{font-size:13px;color:rgba(255,255,255,.85);font-weight:500;}
.logout-btn{padding:7px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:7px;color:rgba(255,255,255,.7);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;}
.logout-btn:hover{background:rgba(255,255,255,.2);color:#fff;}

.content{max-width:1000px;margin:0 auto;padding:32px 24px 64px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;}
.stat-card{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:22px 20px;box-shadow:0 2px 8px rgba(0,0,0,.04);position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac,var(--blue));border-radius:14px 14px 0 0;}
.stat-card[data-c="pend"]{--ac:var(--gold);}
.stat-card[data-c="aprov"]{--ac:var(--green);}
.stat-card[data-c="rejeit"]{--ac:var(--red);}
.stat-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;}
.stat-value{font-family:'Lora',serif;font-size:36px;font-weight:700;color:var(--text);line-height:1;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}

/* FILTERS */
.sec-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.count-badge{background:rgba(26,107,181,.1);color:var(--blue);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:2px 10px;border-radius:100px;}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.fb{padding:6px 14px;border-radius:100px;border:1.5px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;}
.fb.active{border-color:var(--blue);background:rgba(26,107,181,.08);color:var(--blue);}

/* TABLE */
.table-wrap{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);}
table{width:100%;border-collapse:collapse;}
thead th{padding:11px 16px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:#faf8f5;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid #f0ece6;transition:background .15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#faf8f5;}
tbody td{padding:12px 16px;font-size:13px;vertical-align:middle;}
.empty-state{text-align:center;padding:40px 24px;color:var(--muted);}

/* STATUS */
.status-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600;}
.status-pill.pendente{background:rgba(212,131,10,.12);color:#c27800;}
.status-pill.aprovado{background:rgba(45,122,58,.12);color:#1a5c2a;}
.status-pill.rejeitado{background:rgba(200,16,46,.12);color:var(--red);}

/* ACTION BUTTONS */
.btn-aprovar{padding:6px 12px;background:var(--green);color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;}
.btn-aprovar:hover{background:#1f5a29;}
.btn-rejeitar{padding:6px 12px;background:transparent;border:1px solid rgba(200,16,46,.4);color:var(--red);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;margin-left:4px;}
.btn-rejeitar:hover{background:var(--red-light);}
.file-link{font-size:11px;color:var(--blue);text-decoration:none;}
.file-link:hover{text-decoration:underline;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--white);border-radius:16px;padding:28px;width:100%;max-width:440px;box-shadow:0 24px 60px rgba(0,0,0,.25);animation:popIn .25s ease;}
.modal h3{font-family:'Lora',serif;font-size:17px;margin-bottom:8px;}
.modal p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.modal label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;}
.modal textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;resize:vertical;min-height:80px;outline:none;transition:border-color .2s;}
.modal textarea:focus{border-color:var(--blue);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
.btn-cancel{padding:9px 18px;border-radius:7px;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--muted);}
.btn-confirm{padding:9px 20px;border-radius:7px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}

@media(max-width:640px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .stat-card:first-child{grid-column:1/-1;}
  .topbar{padding:0 16px;}
  .content{padding:20px 16px 48px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="leaf">🍁</div>
      <h1>Maple Bear</h1>
      <span>Portal da Secretaria</span>
    </div>
    <h2>Entrar</h2>
    <div class="lf"><label>E-mail</label><input type="email" id="loginEmail" placeholder="secretaria@escola.com" autocomplete="email"></div>
    <div class="lf"><label>Senha</label><input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Entrar</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="leaf">🍁</div>
      <div><h1>Maple Bear</h1><span>Portal da Secretaria</span></div>
    </div>
    <div class="topbar-user">
      <span class="user-name" id="userNome"></span>
      <button class="logout-btn" onclick="doLogout()">↩ Sair</button>
    </div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card" data-c="pend">
        <div class="stat-label">Pendentes</div>
        <div class="stat-value" id="statPend">—</div>
        <div class="stat-sub">aguardando análise</div>
      </div>
      <div class="stat-card" data-c="aprov">
        <div class="stat-label">Aprovados</div>
        <div class="stat-value" id="statAprov">—</div>
        <div class="stat-sub">atestados validados</div>
      </div>
      <div class="stat-card" data-c="rejeit">
        <div class="stat-label">Rejeitados</div>
        <div class="stat-value" id="statRejeit">—</div>
        <div class="stat-sub">atestados negados</div>
      </div>
    </div>

    <!-- Atestados -->
    <div class="sec-title">📋 Atestados das Professoras <span class="count-badge" id="atestCount">0</span></div>
    <div class="filter-bar">
      <button class="fb active" onclick="setFilter('todos',this)">Todos</button>
      <button class="fb" onclick="setFilter('pendente',this)">⏳ Pendentes</button>
      <button class="fb" onclick="setFilter('aprovado',this)">✅ Aprovados</button>
      <button class="fb" onclick="setFilter('rejeitado',this)">❌ Rejeitados</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Professora</th>
            <th>Período de Afastamento</th>
            <th>Motivo</th>
            <th>Status</th>
            <th>Enviado em</th>
            <th>Validado por</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="atestBody">
          <tr><td colspan="7" class="empty-state">⏳ Carregando…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL: validação -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalDesc"></p>
    <label>Observação (opcional)</label>
    <textarea id="modalObs" placeholder="Comentário para a professora…"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" id="modalBtn" onclick="confirmAction()"></button>
    </div>
  </div>
</div>

<script>
  const API  = 'https://brgorknbrjlfwvrrlwxj.supabase.co/functions/v1/diplomas';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyZ29ya25icmpsZnd2cnJsd3hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjU0NTUsImV4cCI6MjA4OTM0MTQ1NX0.QKX_6ZSfied60ZpB8VOx03hwiyD9J5lskKwfl-oXPYE';

  let currentFilter = 'todos';
  let pendingAction = null; // { tipo, id }
  let allData = [];

  // ── TOAST NOTIFICATIONS ────────────────────────────────
  function showToast(msg, type = 'info', duration = 4000) {
    let container = document.getElementById('toastContainer');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toastContainer';
      container.style.cssText = 'position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px;max-width:380px;';
      document.body.appendChild(container);
    }
    const colors = { success:'#2d7a3a', error:'#C8102E', info:'#1a6bb5', warning:'#d4830a' };
    const toast = document.createElement('div');
    toast.style.cssText = `background:${colors[type]||colors.info};color:#fff;padding:12px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:popIn .3s ease;line-height:1.4;`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity='0'; toast.style.transition='opacity .3s'; setTimeout(() => toast.remove(), 300); }, duration);
  }

  function getToken() { return localStorage.getItem('sec_token'); }

  async function callApi(body) {
    const tok = getToken();
    const headers = { 'Content-Type': 'application/json', 'apikey': ANON };
    if (tok) headers['Authorization'] = 'Bearer ' + tok;
    const r = await fetch(API, { method: 'POST', headers, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.error === 'Sessão inválida ou expirada. Faça login novamente.') doLogout();
    return d;
  }

  // ── AUTH ──────────────────────────────────────────────────
  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginPass').value;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Entrando…';
    // Tenta login unificado primeiro, fallback para legado
    let d = await callApi({ action: 'unified_login', email, senha, papel: '' }).catch(() => null);
    if (!d || d.error) d = await callApi({ action: 'secretaria_login', email, senha }).catch(() => ({ error: 'Erro de conexão.' }));
    if (d.error) {
      errEl.textContent = d.error; errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Entrar'; return;
    }
    localStorage.setItem('sec_token', d.token);
    localStorage.setItem('sec_nome', d.nome);
    showApp(d);
  }

  async function doLogout() {
    await callApi({ action: 'unified_logout' }).catch(() => {});
    await callApi({ action: 'secretaria_logout' }).catch(() => {});
    localStorage.removeItem('sec_token');
    localStorage.removeItem('sec_nome');
    document.getElementById('appShell').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
  }

  function checkSession() {
    if (!getToken()) return;
    showApp({ nome: localStorage.getItem('sec_nome') || '' });
  }

  function showApp(user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appShell').style.display = 'block';
    document.getElementById('userNome').textContent = user.nome || '';
    loadAtestados();
  }

  // ── DATA ──────────────────────────────────────────────────
  async function loadAtestados() {
    const d = await callApi({ action: 'atestados_all', status: 'todos' });
    allData = d.data || [];
    updateStats();
    renderTable();
  }

  function updateStats() {
    document.getElementById('statPend').textContent   = allData.filter(x => x.status === 'pendente').length;
    document.getElementById('statAprov').textContent  = allData.filter(x => x.status === 'aprovado').length;
    document.getElementById('statRejeit').textContent = allData.filter(x => x.status === 'rejeitado').length;
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-bar .fb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function renderTable() {
    const lista = currentFilter === 'todos' ? allData : allData.filter(x => x.status === currentFilter);
    document.getElementById('atestCount').textContent = lista.length;
    const tb = document.getElementById('atestBody');
    if (!lista.length) { tb.innerHTML = '<tr><td colspan="7" class="empty-state">📭 Nenhum atestado encontrado.</td></tr>'; return; }

    const STATUS = {
      pendente:  '<span class="status-pill pendente">⏳ Pendente</span>',
      aprovado:  '<span class="status-pill aprovado">✅ Aprovado</span>',
      rejeitado: '<span class="status-pill rejeitado">❌ Rejeitado</span>',
    };

    tb.innerHTML = lista.map(a => {
      const prof = a.professoras || {};
      const dtInicio = fmtDate(a.data_inicio);
      const dtFim    = fmtDate(a.data_fim);
      const periodo  = a.data_inicio === a.data_fim ? dtInicio : `${dtInicio} → ${dtFim}`;
      const enviado  = new Date(a.criado_em).toLocaleDateString('pt-BR');
      const fileLink = a.arquivo_url
        ? `<a class="file-link" href="${a.arquivo_url}" target="_blank">📎 Ver atestado</a>` : '—';
      const acoes = a.status === 'pendente'
        ? `<button class="btn-aprovar" onclick="openModal('aprovar','${a.id}','${esc(prof.nome||'')}')">✓ Aprovar</button>
           <button class="btn-rejeitar" onclick="openModal('rejeitar','${a.id}','${esc(prof.nome||'')}')">✕ Rejeitar</button>`
        : `<span style="font-size:12px;color:var(--muted);">${a.observacao ? esc(a.observacao) : '—'}</span>`;
      return `<tr>
        <td><strong>${esc(prof.nome||'—')}</strong><br><small style="color:var(--muted)">${esc(prof.email||'')}</small></td>
        <td style="font-weight:500;">${periodo}<br>${fileLink}</td>
        <td style="color:var(--muted);font-size:12px;">${esc(a.motivo||'—')}</td>
        <td>${STATUS[a.status]||a.status}</td>
        <td style="color:var(--muted);font-size:12px;">${enviado}</td>
        <td style="font-size:12px;color:var(--muted);">${esc(a.validado_por||'—')}</td>
        <td style="white-space:nowrap;">${acoes}</td>
      </tr>`;
    }).join('');
  }

  // ── MODAL ─────────────────────────────────────────────────
  function openModal(tipo, id, nomeProfessora) {
    pendingAction = { tipo, id };
    const isAprovar = tipo === 'aprovar';
    document.getElementById('modalTitle').textContent = isAprovar ? '✅ Aprovar Atestado' : '❌ Rejeitar Atestado';
    document.getElementById('modalDesc').textContent = `${isAprovar ? 'Confirmar aprovação' : 'Rejeitar'} do atestado de ${nomeProfessora}?`;
    document.getElementById('modalObs').value = '';
    const btn = document.getElementById('modalBtn');
    btn.textContent = isAprovar ? 'Aprovar' : 'Rejeitar';
    btn.style.background = isAprovar ? 'var(--green)' : 'var(--red)';
    btn.style.color = '#fff';
    document.getElementById('modalOverlay').classList.add('show');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); pendingAction = null; }

  async function confirmAction() {
    if (!pendingAction) return;
    const { tipo, id } = pendingAction;
    const observacao = document.getElementById('modalObs').value.trim();
    const btn = document.getElementById('modalBtn');
    btn.disabled = true; btn.textContent = 'Salvando…';
    const d = await callApi({ action: tipo === 'aprovar' ? 'atestado_aprovar' : 'atestado_rejeitar', id, observacao: observacao || undefined });
    btn.disabled = false;
    if (d.error) { showToast('Erro: ' + d.error, 'error'); btn.textContent = tipo === 'aprovar' ? 'Aprovar' : 'Rejeitar'; return; }
    closeModal();
    loadAtestados();
  }

  // ── HELPERS ───────────────────────────────────────────────
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtDate(iso) { if (!iso) return '—'; const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`; }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none'
        && document.getElementById('appShell').style.display === 'none') doLogin();
  });

  checkSession();

  // ── OFFLINE DETECTION ──────────────────────────────────
  function showOfflineBanner(show) {
    let b = document.getElementById('offlineBanner');
    if (!b) {
      b = document.createElement('div');
      b.id = 'offlineBanner';
      b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#d4830a;color:#fff;text-align:center;padding:10px;font-size:13px;font-weight:600;z-index:9999;font-family:"DM Sans",sans-serif;transition:transform .3s;';
      b.textContent = '📡 Sem conexão com a internet';
      document.body.appendChild(b);
    }
    b.style.transform = show ? 'translateY(0)' : 'translateY(100%)';
  }
  window.addEventListener('offline', () => showOfflineBanner(true));
  window.addEventListener('online', () => showOfflineBanner(false));
  if (!navigator.onLine) showOfflineBanner(true);
</script>
</body>
</html>
