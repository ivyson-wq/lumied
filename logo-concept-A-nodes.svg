<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" width="240" height="50">
  <defs>
    <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Abstract L shape made of connected dots/nodes -->
  <circle cx="12" cy="10" r="4" fill="url(#ag)" opacity="0.4"/>
  <circle cx="12" cy="22" r="4" fill="url(#ag)" opacity="0.6"/>
  <circle cx="12" cy="34" r="5" fill="url(#ag)"/>
  <circle cx="24" cy="34" r="4" fill="url(#ag)" opacity="0.8"/>
  <circle cx="36" cy="34" r="3.5" fill="url(#ag)" opacity="0.5"/>
  <!-- Connection lines -->
  <line x1="12" y1="14" x2="12" y2="18" stroke="url(#ag)" stroke-width="1.5" opacity="0.4"/>
  <line x1="12" y1="26" x2="12" y2="29" stroke="url(#ag)" stroke-width="1.5" opacity="0.6"/>
  <line x1="17" y1="34" x2="20" y2="34" stroke="url(#ag)" stroke-width="1.5" opacity="0.7"/>
  <line x1="28" y1="34" x2="32.5" y2="34" stroke="url(#ag)" stroke-width="1.5" opacity="0.5"/>

  <!-- Text -->
  <text x="48" y="36" font-family="'Inter',system-ui,sans-serif" font-size="32" font-weight="600" fill="#1E293B" letter-spacing="-1">lumied</text>
</svg>