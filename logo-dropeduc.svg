<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
  </defs>

  <!-- Drop icon -->
  <g transform="translate(30, 10)">
    <!-- Main drop shape -->
    <path d="M35 8 C35 8, 8 42, 8 58 C8 73, 20 85, 35 85 C50 85, 62 73, 62 58 C62 42, 35 8, 35 8Z"
          fill="url(#dropGrad)" />
    <!-- Graduation cap inside the drop -->
    <polygon points="35,38 18,48 35,58 52,48" fill="white" opacity="0.95"/>
    <rect x="33" y="38" width="4" height="4" fill="white" opacity="0.95" rx="1"/>
    <line x1="49" y1="48" x2="49" y2="62" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <circle cx="49" cy="63" r="2" fill="white" opacity="0.9"/>
    <!-- Cap tassel line -->
    <polyline points="35,58 25,63 25,53" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Text "drop" -->
  <text x="105" y="75" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="52" font-weight="700" fill="#1E3A5F" letter-spacing="-1">
    drop
  </text>

  <!-- Text "educ" -->
  <text x="248" y="75" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="52" font-weight="300" fill="url(#dropGrad)" letter-spacing="-1">
    educ
  </text>
</svg>