<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <radialGradient id="lightGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#F59E0B;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: compact light bulb with book -->
  <g transform="translate(16, 10)">
    <!-- Bulb body -->
    <path d="M28 14 C17 14, 8 24, 8 34 C8 42, 13 48, 20 51 L20 60 L36 60 L36 51 C43 48, 48 42, 48 34 C48 24, 39 14, 28 14Z"
          fill="url(#glowGrad)" opacity="0.9"/>

    <!-- Light rays -->
    <line x1="28" y1="4" x2="28" y2="9" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="10" y1="16" x2="13" y2="19" stroke="#FCD34D" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="46" y1="16" x2="43" y2="19" stroke="#FCD34D" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="3" y1="34" x2="6" y2="34" stroke="#FCD34D" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="50" y1="34" x2="53" y2="34" stroke="#FCD34D" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Book pages inside bulb -->
    <path d="M28 27 L18 32 L18 45 L28 40Z" fill="white" opacity="0.9"/>
    <path d="M28 27 L38 32 L38 45 L28 40Z" fill="white" opacity="0.7"/>
    <line x1="28" y1="27" x2="28" y2="40" stroke="white" stroke-width="1.2" opacity="0.5"/>

    <!-- Bulb base -->
    <rect x="21" y="60" width="14" height="3" rx="1" fill="#64748B"/>
    <rect x="23" y="63" width="10" height="3" rx="1" fill="#64748B"/>
    <rect x="25" y="66" width="6" height="3" rx="1.5" fill="#64748B"/>
  </g>

  <!-- Text "lumi" bold - closer to icon -->
  <text x="75" y="58" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="46" font-weight="700" fill="#1E293B" letter-spacing="-1.5">
    lumi
  </text>

  <!-- Text "ed" light with gradient - tight to "lumi" -->
  <text x="200" y="58" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="46" font-weight="300" fill="url(#glowGrad)" letter-spacing="-1.5">
    ed
  </text>

  <!-- Glowing dot on the i -->
  <circle cx="189" cy="28" r="4.5" fill="url(#lightGlow)" filter="url(#glow)"/>
</svg>