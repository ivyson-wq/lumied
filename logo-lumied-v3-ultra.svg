<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="220" height="50">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#F59E0B;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0"/>
    </radialGradient>
    <filter id="f"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Tiny bulb icon -->
  <g transform="translate(6, 5)">
    <path d="M16 6 C10 6, 4 13, 4 19 C4 24, 7 27, 11 29 L11 34 L21 34 L21 29 C25 27, 28 24, 28 19 C28 13, 22 6, 16 6Z"
          fill="url(#grad)" opacity="0.9"/>
    <line x1="16" y1="1" x2="16" y2="3.5" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round" filter="url(#f)"/>
    <line x1="6" y1="8" x2="8" y2="10" stroke="#FCD34D" stroke-width="1.2" stroke-linecap="round" filter="url(#f)"/>
    <line x1="26" y1="8" x2="24" y2="10" stroke="#FCD34D" stroke-width="1.2" stroke-linecap="round" filter="url(#f)"/>
    <path d="M16 15 L10 18 L10 26 L16 23Z" fill="white" opacity="0.9"/>
    <path d="M16 15 L22 18 L22 26 L16 23Z" fill="white" opacity="0.7"/>
    <rect x="12" y="34" width="8" height="2" rx="0.8" fill="#64748B"/>
    <rect x="13" y="36" width="6" height="2" rx="0.8" fill="#64748B"/>
  </g>

  <!-- "lumi" bold -->
  <text x="42" y="33" font-family="'Inter',system-ui,sans-serif"
        font-size="30" font-weight="700" fill="#1E293B" letter-spacing="-1">lumi</text>

  <!-- "ed" light gradient -->
  <text x="124" y="33" font-family="'Inter',system-ui,sans-serif"
        font-size="30" font-weight="300" fill="url(#grad)" letter-spacing="-1">ed</text>

  <!-- Dot on i -->
  <circle cx="113" cy="14" r="3" fill="url(#glow)" filter="url(#f)"/>
</svg>