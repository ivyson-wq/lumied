<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <radialGradient id="lightGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#F59E0B;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: light bulb with book pages -->
  <g transform="translate(28, 8)">
    <!-- Bulb body -->
    <path d="M35 18 C20 18, 10 30, 10 42 C10 52, 16 60, 25 64 L25 75 L45 75 L45 64 C54 60, 60 52, 60 42 C60 30, 50 18, 35 18Z"
          fill="url(#glowGrad)" opacity="0.9"/>

    <!-- Light rays -->
    <line x1="35" y1="6" x2="35" y2="12" stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="12" y1="20" x2="16" y2="24" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="58" y1="20" x2="54" y2="24" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="4" y1="42" x2="8" y2="42" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
    <line x1="62" y1="42" x2="66" y2="42" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>

    <!-- Book pages inside bulb -->
    <path d="M35 34 L22 40 L22 56 L35 50Z" fill="white" opacity="0.9"/>
    <path d="M35 34 L48 40 L48 56 L35 50Z" fill="white" opacity="0.7"/>
    <line x1="35" y1="34" x2="35" y2="50" stroke="white" stroke-width="1.5" opacity="0.5"/>

    <!-- Bulb base -->
    <rect x="26" y="75" width="18" height="4" rx="1" fill="#64748B"/>
    <rect x="28" y="79" width="14" height="3" rx="1" fill="#64748B"/>
    <rect x="30" y="82" width="10" height="3" rx="2" fill="#64748B"/>
  </g>

  <!-- Text "lumi" bold -->
  <text x="105" y="72" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="52" font-weight="700" fill="#1E293B" letter-spacing="-1.5">
    lumi
  </text>

  <!-- Text "ed" light with gradient -->
  <text x="248" y="72" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="52" font-weight="300" fill="url(#glowGrad)" letter-spacing="-1.5">
    ed
  </text>

  <!-- Glowing dot on the i -->
  <circle cx="218" cy="38" r="5" fill="url(#lightGlow)" filter="url(#glow)"/>
</svg>