name: Outbound Pulse Diário

on:
  workflow_dispatch:
  push:
    paths:
      - .github/outbound-trigger.txt
  # Schedule MIGRADO pra pg_cron (mig 329).
  # Edge function: outbound-pulse-cron. Roda 10h UTC dias úteis.
  # Este workflow vira fallback manual: rode via workflow_dispatch
  # ou push em .github/outbound-trigger.txt se pg_cron falhar.

env:
  SUPABASE_PROJECT_REF: brgorknbrjlfwvrrlwxj
  # CRON_INTERNAL_KEY agora vem de GH secret (rotação mig 330).
  # Default só pra fallback manual; produção sempre passa via env override.

jobs:
  pulse:
    name: Outbound Pulse
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run outbound pulse script
        env:
          CRON_INTERNAL_KEY: ${{ secrets.CRON_INTERNAL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: https://brgorknbrjlfwvrrlwxj.supabase.co
        run: node scripts/outbound-pulse.mjs

      - name: Summary
        if: always()
        run: |
          echo "### Outbound Pulse — $(date -u '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "- Executado em: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/pulse-summary.txt ]; then
            cat /tmp/pulse-summary.txt >> $GITHUB_STEP_SUMMARY
          fi
