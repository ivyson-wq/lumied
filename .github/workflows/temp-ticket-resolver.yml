name: "[TEMP] Support Ticket Auto-Resolver"

on:
  push:
    branches:
      - support/auto-tickets-*
  workflow_dispatch:

jobs:
  resolve-tickets:
    name: Process Open Support Tickets
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_PROJECT_REF: brgorknbrjlfwvrrlwxj

    steps:
      - name: Process tickets
        run: |
          pip install requests -q

          python3 << 'PYEOF'
          import os, json, requests, re, unicodedata

          PROJECT_REF = os.environ["SUPABASE_PROJECT_REF"]
          API = f"https://api.supabase.com/v1/projects/{PROJECT_REF}/database/query"
          AUTH = {"Authorization": f"Bearer {os.environ['SUPABASE_ACCESS_TOKEN']}",
                  "Content-Type": "application/json"}
          ANTHROPIC_KEY = os.environ.get("ANTHROPIC_API_KEY", "")

          def run_sql(sql: str):
              r = requests.post(API, headers=AUTH, json={"query": sql}, timeout=20)
              if not r.ok:
                  print(f"  SQL ERROR {r.status_code}: {r.text[:300]}")
                  return None
              return r.json()

          def esc(val: str) -> str:
              """Escape value for PostgreSQL using dollar-quoting."""
              # Use a tag unlikely to appear in user text
              tag = "$lum$"
              if tag in (val or ""):
                  tag = "$lumied_resp$"
              return f"{tag}{val}{tag}"

          def normalize(text: str) -> str:
              nfkd = unicodedata.normalize("NFKD", text.lower())
              return "".join(c for c in nfkd if not unicodedata.combining(c))

          FAQ = [
              (["login","entrar","senha","password","acesso negado","nao consigo entrar","magic link"],
               "Tente as seguintes soluções:\n1. Limpe o cache do navegador (Ctrl+Shift+Del)\n2. Tente em uma aba anônima\n3. Verifique se o email está correto\n4. Use a opção 'Magic Link' para receber um link por email\n5. Se usa biometria, desative e reative nas configurações"),
              (["lento","devagar","carregando","loading","demora","travando"],
               "Para melhorar a performance:\n1. Verifique sua conexão de internet\n2. Limpe o cache do navegador\n3. Feche abas desnecessárias\n4. Use Chrome ou Edge atualizados\n5. Em mobile, feche e reabra o app"),
              (["boleto","pagamento","cobranca","cobranc","fatura","pagar"],
               "Sobre boletos e pagamentos:\n1. Boletos podem levar até 24h para aparecer após emissão\n2. Após pagamento, o status atualiza em até 48h úteis\n3. Para segunda via, acesse a aba 'Boletos' no portal dos pais"),
              (["relatorio","exportar","excel","pdf","download"],
               "Para exportar relatórios:\n1. Acesse o módulo desejado\n2. Clique em 'Exportar' ou no ícone de download\n3. Selecione o formato (Excel ou PDF)\n4. Verifique se pop-ups não estão bloqueados no navegador"),
              (["nota","frequencia","presenca","chamada","boletim"],
               "Para acessar notas e frequência:\n1. Portal da professora: menu 'Notas' ou 'Chamada'\n2. Portal dos pais: 'Boletim' do aluno\n3. Verifique se está no período letivo correto\n4. Em caso de divergência, contate a secretaria"),
              (["sugestao","sugestão","melhoria","feature","funcionalidade","ideia"],
               "Obrigado pela sugestão! Registramos sua ideia e nossa equipe de produto irá analisá-la. Agradecemos o feedback — é assim que melhoramos a Lumied!"),
              (["erro","bug","falha","nao funciona","nao abre","travou","caiu"],
               "Lamentamos o inconveniente. Para resolver o problema:\n1. Recarregue a página (F5 ou Ctrl+R)\n2. Limpe o cache (Ctrl+Shift+Del)\n3. Tente em aba anônima\n4. Se persistir, anote o horário e tente novamente em 5 minutos — nossa equipe monitora os erros em tempo real"),
          ]

          def faq_match(descricao: str):
              norm = normalize(descricao or "")
              for keywords, resposta in FAQ:
                  if any(kw in norm for kw in keywords):
                      return resposta
              return None

          def ask_claude(ticket_info: str) -> str:
              if not ANTHROPIC_KEY:
                  return ""
              payload = {
                  "model": "claude-haiku-4-5-20251001",
                  "max_tokens": 350,
                  "system": (
                      "Você é um agente de suporte da Lumied (SaaS de gestão escolar). "
                      "Analise o ticket e dê uma resposta clara, útil e concisa em português. "
                      "Se não souber a resposta, diga que será escalado para a equipe. "
                      "Máximo 3 parágrafos curtos."
                  ),
                  "messages": [{"role": "user", "content": ticket_info}],
              }
              try:
                  r = requests.post(
                      "https://api.anthropic.com/v1/messages",
                      headers={"x-api-key": ANTHROPIC_KEY, "anthropic-version": "2023-06-01",
                               "Content-Type": "application/json"},
                      json=payload, timeout=20
                  )
                  if r.ok:
                      return r.json()["content"][0]["text"].strip()
              except Exception as e:
                  print(f"  Claude error: {e}")
              return ""

          # ── Query open tickets ──
          print("Consultando tickets abertos...")
          rows = run_sql(
              "SELECT id, numero, email, nome, portal, tipo, descricao, url_pagina, user_agent, escola_id "
              "FROM tickets WHERE status = 'aberto' ORDER BY criado_em ASC LIMIT 10"
          )

          if rows is None:
              print("Erro ao consultar banco. Abortando.")
              exit(1)

          if not rows:
              print("Nenhum ticket aberto. Nada a fazer.")
              exit(0)

          print(f"Encontrados {len(rows)} tickets abertos.\n")

          resolved = 0
          escalated = 0

          for ticket in rows:
              tid  = ticket["id"]
              num  = ticket["numero"]
              nome = ticket.get("nome") or "Cliente"
              email = ticket.get("email", "")
              portal = ticket.get("portal") or "desconhecido"
              tipo  = ticket.get("tipo") or "duvida"
              desc  = ticket.get("descricao") or ""

              print(f"{'━'*50}")
              print(f"Ticket #{num} | {email} | Portal: {portal} | Tipo: {tipo}")
              print(f"Descrição: {desc[:200]}")

              # Try FAQ match first (fast path)
              resposta = faq_match(desc)
              if resposta:
                  tratamento = "FAQ match automático via GitHub Actions"
                  status = "respondido"
                  print(f"→ FAQ match")
              else:
                  # Try Claude Haiku (slow path)
                  print(f"→ Consultando Claude Haiku...")
                  ticket_info = (
                      f"Ticket #{num} | Portal: {portal} | Tipo: {tipo}\n"
                      f"De: {nome} ({email})\n"
                      f"Descrição:\n{desc}"
                  )
                  ai_resp = ask_claude(ticket_info)

                  if ai_resp and len(ai_resp) > 30:
                      resposta = ai_resp
                      tratamento = "Respondido por Claude Haiku via GitHub Actions"
                      status = "respondido"
                      print(f"→ Claude respondeu")
                  else:
                      resposta = (
                          f"Olá {nome}! Recebemos sua solicitação (#{num}) e nossa equipe "
                          "irá analisá-la em breve. Agradecemos a compreensão."
                      )
                      tratamento = (
                          f"Ticket sem correspondência em FAQ. Portal: {portal}, Tipo: {tipo}. "
                          "Análise humana necessária."
                      )
                      status = "escalado"
                      print(f"→ Escalado")

              print(f"   Status: {status}")
              print(f"   Resposta: {resposta[:120]}...")

              # Update ticket using dollar-quoting (safe for any string content)
              sql = (
                  f"UPDATE tickets SET "
                  f"status = {esc(status)}, "
                  f"resposta = {esc(resposta)}, "
                  f"tratamento = {esc(tratamento)}, "
                  f"proximos_passos = NULL, "
                  f"respondido_por = {esc('claude-ai@lumied.com.br')}, "
                  f"atualizado_em = now() "
                  f"WHERE id = {esc(tid)}"
              )
              result = run_sql(sql)
              if result is not None:
                  print(f"   ✓ Atualizado no banco")
                  if status == "respondido":
                      resolved += 1
                  else:
                      escalated += 1
              else:
                  print(f"   ⚠️  Falha ao atualizar")

          print(f"\n{'━'*50}")
          print(f"✅ Concluído: {resolved} resolvido(s), {escalated} escalado(s)")
          PYEOF
