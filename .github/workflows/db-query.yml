name: DB Query (read-only diagnostics)

# Manual SQL execution via Supabase Management API.
# Use for ad-hoc diagnostics. Result body is printed in the run log.
# Avoid destructive statements — there is no transaction guard here.

on:
  workflow_dispatch:
    inputs:
      sql:
        description: 'SQL query to execute (single statement or semicolon-separated). Body will be printed.'
        required: true

env:
  SUPABASE_PROJECT_REF: brgorknbrjlfwvrrlwxj
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  query:
    name: Run SQL via Management API
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Execute
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"
          CT="Content-Type: application/json"
          payload=$(jq -n --arg q "${{ github.event.inputs.sql }}" '{query:$q}')
          http=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST "$API" -H "$AUTH" -H "$CT" -d "$payload")
          echo "HTTP $http"
          echo "--- Response ---"
          if jq . /tmp/resp.json 2>/dev/null; then :; else cat /tmp/resp.json; fi
          [ "$http" = "200" ] || [ "$http" = "201" ] || exit 1
