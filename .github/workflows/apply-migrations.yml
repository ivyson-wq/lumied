name: Apply DB Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/*.sql'
  workflow_dispatch:
    inputs:
      force_migration:
        description: 'Specific migration file to apply (e.g. 214_papel_impressao.sql). Leave empty to auto-detect.'
        required: false
        default: ''

env:
  SUPABASE_PROJECT_REF: brgorknbrjlfwvrrlwxj
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  apply:
    name: Apply pending migrations via Management API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Apply migrations
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"
          CT="Content-Type: application/json"

          run_sql() {
            local sql="$1"
            local payload
            payload=$(jq -n --arg q "$sql" '{query:$q}')
            curl -sf -X POST "$API" -H "$AUTH" -H "$CT" -d "$payload"
          }

          run_sql_file() {
            local file="$1"
            local payload
            payload=$(jq -Rs '{query: .}' < "$file")
            local http
            http=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST "$API" -H "$AUTH" -H "$CT" -d "$payload")
            if [ "$http" != "200" ] && [ "$http" != "201" ]; then
              echo "❌ HTTP $http"
              cat /tmp/resp.txt
              return 1
            fi
            return 0
          }

          # Ensure tracking table exists (log only, not filter)
          run_sql "CREATE TABLE IF NOT EXISTS public._ci_applied_migrations (version TEXT PRIMARY KEY, name TEXT, applied_at TIMESTAMPTZ DEFAULT NOW())" > /dev/null

          FORCE="${{ github.event.inputs.force_migration || '' }}"

          if [ -n "$FORCE" ]; then
            FILE="supabase/migrations/$FORCE"
            if [ ! -f "$FILE" ]; then
              echo "❌ File not found: $FILE"
              exit 1
            fi
            TARGETS="$FILE"
          else
            # Auto-detect from last commit
            TARGETS=$(git diff-tree --no-commit-id --name-only --diff-filter=AM -r HEAD -- 'supabase/migrations/*.sql' || echo "")
          fi

          if [ -z "$TARGETS" ]; then
            echo "No migrations to apply."
            exit 0
          fi

          echo "Targets:"
          echo "$TARGETS"
          echo "---"

          for f in $(echo "$TARGETS" | sort); do
            base=$(basename "$f" .sql)
            version=$(echo "$base" | sed 's/^\([0-9]*\)_.*/\1/')
            echo "▶  Applying $base..."
            if run_sql_file "$f"; then
              run_sql "INSERT INTO public._ci_applied_migrations (version, name) VALUES ('$version', '$base') ON CONFLICT (version) DO UPDATE SET applied_at = NOW()" > /dev/null
              echo "✓  Applied $base"
            else
              echo "❌ Failed to apply $base"
              exit 1
            fi
          done

          echo "✅ Done"
