name: CI — Lint, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_REF: brgorknbrjlfwvrrlwxj

jobs:
  # ═══ 1. LINT & TYPE CHECK ═══
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno lint (Edge Functions)
        run: deno lint --config supabase/functions/deno.json supabase/functions/_shared/ supabase/functions/__tests__/

      - name: Deno check (Type Check)
        run: |
          set -e
          for f in supabase/functions/_shared/*.ts; do
            echo "Checking $f..."
            deno check --config supabase/functions/deno.json "$f"
          done

  # ═══ 2. UNIT TESTS ═══
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Deno tests
        run: deno test --config supabase/functions/deno.json supabase/functions/__tests__/ --allow-net --allow-read --allow-env

  # ═══ 3. DEPLOY (only on main push) ═══
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }}

      - name: Deploy Edge Functions
        run: |
          set -e
          FAILED=()
          for dir in supabase/functions/*/; do
            name=$(basename "$dir")
            if [ "$name" != "_shared" ] && [ "$name" != "__tests__" ]; then
              echo "▶ Deploying: $name"
              if supabase functions deploy "$name" --no-verify-jwt; then
                echo "✓ $name"
              else
                echo "✗ $name failed"
                FAILED+=("$name")
              fi
            fi
          done
          if [ ${#FAILED[@]} -ne 0 ]; then
            echo "::error::Failed to deploy: ${FAILED[*]}"
            exit 1
          fi

  # ═══ 3b. API CONTRACT SMOKE TEST (after deploy) ═══
  api-smoke-test:
    name: API Contract Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-functions]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run API smoke test (188 actions across 7 edge functions)
        run: node tests/smoke/smoke-api.mjs

      - name: Run UX smoke test (88 checks)
        run: node tests/smoke/smoke-ux.mjs

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [lint, test, deploy-functions, api-smoke-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend bundles (esbuild)
        run: node build.js

      - name: Link Vercel project
        run: npx vercel link --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: npx vercel --yes --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ═══ 4. SENTRY RELEASE & SOURCE MAPS ═══
  sentry-release:
    name: Sentry Release & Source Maps
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sentry-cli
        run: npm install -g @sentry/cli

      - name: Create Sentry release & upload source maps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: lumied
          SENTRY_PROJECT: javascript
        run: |
          VERSION="maple-bear-rs@$(git rev-parse --short HEAD)"
          echo "Creating Sentry release: $VERSION"

          sentry-cli releases new "$VERSION"
          sentry-cli releases set-commits "$VERSION" --auto

          # Upload JS source maps from dist/
          if [ -d "dist" ]; then
            sentry-cli sourcemaps upload --release="$VERSION" dist/ --url-prefix "~/dist"
          fi

          # Upload root-level JS files
          sentry-cli sourcemaps upload --release="$VERSION" \
            --url-prefix "~/" \
            sentry-init.js config.js sw.js webauthn-client.js 2>/dev/null || true

          sentry-cli releases finalize "$VERSION"
          sentry-cli releases deploys "$VERSION" new -e production
          echo "Sentry release $VERSION finalized."
