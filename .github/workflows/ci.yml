name: CI — Lint, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_REF: brgorknbrjlfwvrrlwxj

jobs:
  # ═══ 1. LINT & TYPE CHECK ═══
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno lint (Edge Functions)
        run: deno lint --config supabase/functions/deno.json supabase/functions/_shared/ supabase/functions/__tests__/

      - name: Deno check (Type Check)
        run: |
          for f in supabase/functions/_shared/*.ts; do
            echo "Checking $f..."
            deno check "$f" || true
          done

  # ═══ 2. UNIT TESTS ═══
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Deno tests
        run: deno test --config supabase/functions/deno.json supabase/functions/__tests__/ --allow-net --allow-read --allow-env

  # ═══ 3. DEPLOY (only on main push) ═══
  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_REF }}

      - name: Deploy Edge Functions
        run: |
          for dir in supabase/functions/*/; do
            name=$(basename "$dir")
            if [ "$name" != "_shared" ] && [ "$name" != "__tests__" ]; then
              echo "Deploying: $name"
              supabase functions deploy "$name" --no-verify-jwt || echo "Failed: $name"
            fi
          done

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Vercel
        run: npx vercel --yes --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
