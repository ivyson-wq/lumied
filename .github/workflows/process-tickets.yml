name: Process Support Tickets

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/process-tickets.yml'
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: brgorknbrjlfwvrrlwxj
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  process:
    name: Acionar ticket-resolver via SQL
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ticket_resolver_if_needed()
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"
          CT="Content-Type: application/json"

          RESULT=$(curl -sf -X POST "$API" \
            -H "$AUTH" -H "$CT" \
            -d '{"query":"SELECT public.ticket_resolver_if_needed()"}')

          echo "Resultado: $RESULT"

      - name: Listar tickets abertos (diagnóstico)
        run: |
          set -euo pipefail
          API="https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query"
          AUTH="Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"
          CT="Content-Type: application/json"

          curl -sf -X POST "$API" \
            -H "$AUTH" -H "$CT" \
            -d '{"query":"SELECT numero, email, portal, tipo, LEFT(descricao,80) AS descricao_resumo, status, criado_em FROM tickets ORDER BY criado_em DESC LIMIT 20"}' \
            | python3 -c "
import json, sys
rows = json.load(sys.stdin)
if not rows:
    print('Nenhum ticket.')
else:
    for r in rows:
        print(f\"#{r.get(\\\"numero\\\")} [{r.get(\\\"status\\\")}] {r.get(\\\"portal\\\")} | {r.get(\\\"email\\\")} | {r.get(\\\"descricao_resumo\\\")}\")
"
