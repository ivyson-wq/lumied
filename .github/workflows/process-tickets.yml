name: Process Support Tickets

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/process-tickets.yml'
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: brgorknbrjlfwvrrlwxj
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  process:
    name: Acionar ticket-resolver via SQL
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ticket_resolver_if_needed()
        run: |
          set -euo pipefail
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT public.ticket_resolver_if_needed()"}' \
            | jq .

      - name: Listar tickets abertos (diagnóstico)
        run: |
          set -euo pipefail
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT numero, email, portal, tipo, LEFT(descricao,80) AS descricao_resumo, status, criado_em FROM tickets ORDER BY criado_em DESC LIMIT 20"}' \
            | jq -r 'if length == 0 then "Nenhum ticket." else .[] | "#\(.numero) [\(.status)] \(.portal) | \(.email) | \(.descricao_resumo)" end'
