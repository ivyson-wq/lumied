name: Ticket Bot (temp)

on:
  push:
    branches: [ticket-bot-temp]

jobs:
  escalate-and-cleanup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Escalate ticket #1011 with slug mismatch root cause
        uses: actions/github-script@v7
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        with:
          script: |
            const token = process.env.SUPABASE_ACCESS_TOKEN;
            const ref = 'brgorknbrjlfwvrrlwxj';
            const BASE = `https://api.supabase.com/v1/projects/${ref}/database/query`;
            const h = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

            async function sql(query) {
              const r = await fetch(BASE, { method:'POST', headers:h, body:JSON.stringify({query}) });
              return r.json();
            }

            // Escalar ticket #1011 com causa raiz real (slug mismatch)
            const tratamento = [
              'BUG CONFIRMADO — Slug mismatch entre subdomínio Vercel e slug da escola no banco.',
              '',
              'Escola: Maple Bear Caxias do Sul (ID: f0ab6402-67a0-4829-bdaa-05e90e0b6f9b)',
              '  - Subdomínio Vercel: maplebearcaxias.lumied.com.br',
              '  - Slug no banco (escolas.slug): maple-bear-caxias',
              '',
              'Impacto: resolveEscolaId() tenta resolver via Origin (extraindo slug do hostname).',
              'extractSlug("maplebearcaxias.lumied.com.br") retorna "maplebearcaxias".',
              'Lookup: SELECT id FROM escolas WHERE slug = "maplebearcaxias" → 0 resultados.',
              'Fallback getEscolaPadrao() retorna null em multi-tenant.',
              'Resultado: modulos_habilitados retorna { modulos: [] } → dashboard vazio.',
              '',
              'Quando a sessão da professora está ATIVA: token-based resolution funciona',
              '(professora_sessoes → professoras.escola_id → correto). Por isso o problema',
              'só ocorre quando a sessão expira ou em novos logins antes de ter sessão.',
              '',
              'Escola tem 23 módulos ativos (plano Rede). Configuração OK.',
              'Workaround imediato: relogin (cria nova sessão válida).',
            ].join('\n');

            const proxPassos = [
              'CORREÇÃO RECOMENDADA (escolher uma):',
              '1. Atualizar slug no banco para corresponder ao subdomínio:',
              "   UPDATE escolas SET slug = 'maplebearcaxias' WHERE id = 'f0ab6402-67a0-4829-bdaa-05e90e0b6f9b';",
              '   Verificar se há outras referências ao slug "maple-bear-caxias" no sistema.',
              '',
              '2. Ou criar subdomínio adicional no Vercel: maple-bear-caxias.lumied.com.br',
              '   (para que o slug atual funcione)',
              '',
              '3. Ou corrigir resolveEscolaId em _shared/tenant.ts para tentar busca',
              '   normalizada (remover hífens): WHERE slug = $1 OR slug = replace($1, \'-\', \'\')',
              '   Risco: colisão de slugs com nomes similares.',
              '',
              'Recomendação: opção 1 (mais simples, menor risco).',
              'Após correção: avisar Miss Carol que sistema está normalizado.',
            ].join('\n');

            const resposta = [
              'Identificamos a causa do problema no dashboard da Miss Carol.',
              'O portal estava configurado com uma URL ligeiramente diferente do cadastro da escola no sistema,',
              'o que causava falha ao carregar os módulos quando a sessão expirava.',
              '',
              'SOLUÇÃO IMEDIATA: Miss Carol deve fazer logout e login novamente.',
              'Isso criará uma nova sessão e o dashboard carregará normalmente.',
              '',
              'Estamos corrigindo a configuração da escola para que o problema não se repita.',
              'Em breve o sistema estará 100% estabilizado.',
            ].join('\n');

            await sql(`
              UPDATE tickets
              SET status = 'escalado',
                  resposta = '${resposta.replace(/'/g, "''")}',
                  tratamento = '${tratamento.replace(/'/g, "''")}',
                  proximos_passos = '${proxPassos.replace(/'/g, "''")}',
                  respondido_por = 'claude-ai@lumied.com.br',
                  atualizado_em = now()
              WHERE numero = 1011
            `);

            console.log('Ticket #1011 escalado com causa raiz: slug mismatch');

            // Fechar issues temporárias de diagnóstico
            for (const issueNumber of [12, 13, 14]) {
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'completed'
                });
                console.log(`Issue #${issueNumber} fechada`);
              } catch(e) {
                console.warn(`Falha ao fechar issue #${issueNumber}:`, e.message);
              }
            }

            console.log('Cleanup concluído');
