name: Deploy bank-relay

on:
  push:
    branches: [main]
    paths:
      - 'bank-relay/**'
      - '.github/workflows/deploy-relay.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy bank-relay (Cloudflare Worker)
    runs-on: ubuntu-latest
    concurrency: deploy-bank-relay
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        working-directory: bank-relay
        run: npm install --no-audit --no-fund

      - name: Deploy
        working-directory: bank-relay
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Health check
        run: |
          sleep 5
          # URL do worker: substituir <subdomain> ou usar custom domain configurado
          # Por enquanto só valida que `wrangler deploy` exitou OK acima.
          echo "Deploy OK. Validar manualmente:"
          echo "  curl https://bank-relay.<subdomain>.workers.dev/health"
