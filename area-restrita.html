<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="/sentry-init.js"></script>
<script src="/analytics.js" defer></script>
<title id="pageTitle">Área Restrita</title>
<meta name="theme-color" content="#1c1712">
<link rel="icon" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/lumied-design.css">
<style>
:root{--red:#C8102E;--cream:#f8f5f0;--sb:#1c1712;--border:#e6ddd3;--text:#1a1a1a;--muted:#5a5249;--white:#fff;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--sb);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
body::before{content:'🍁';position:fixed;font-size:320px;opacity:.03;top:-60px;right:-60px;line-height:1;pointer-events:none;}

.container{max-width:480px;width:90%;position:relative;z-index:1;}

.brand{text-align:center;margin-bottom:32px;}
.brand-leaf{width:56px;height:56px;background:rgba(255,255,255,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;border:1.5px solid rgba(255,255,255,.15);}
.brand h1{font-family:'Lora',serif;font-size:20px;color:#fff;font-weight:700;}
.brand p{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px;}
.brand .user-greeting{font-size:13px;color:rgba(255,255,255,.7);margin-top:8px;}

.portal-card{display:flex;align-items:center;gap:16px;background:var(--white);border-radius:14px;padding:20px 24px;margin-bottom:12px;text-decoration:none;color:var(--text);transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.08);border:1px solid var(--border);}
.portal-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
.portal-card.disabled{opacity:.35;pointer-events:none;transform:none;}
.portal-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.portal-info h3{font-family:'Lora',serif;font-size:15px;font-weight:700;margin-bottom:3px;}
.portal-info p{font-size:12px;color:var(--muted);line-height:1.4;}
.portal-arrow{margin-left:auto;color:var(--muted);font-size:18px;flex-shrink:0;}

.back-link{display:block;text-align:center;margin-top:24px;color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;transition:color .2s;}
.back-link:hover{color:#fff;}
</style>
</head>
<body>

<div class="container" role="main">
  <div class="brand">
    <img src="/lumied-logo-branco.png" id="brandLeaf" class="brand-leaf" style="height:48px;width:auto;object-fit:contain;background:none;border:none;" alt="Lumied">
    <h1 id="brandName"></h1>
    <p>Área Restrita — Equipe Escolar</p>
    <div class="user-greeting" id="userGreeting"></div>
  </div>

  <div id="portais"></div>

  <a href="index.html" class="back-link">← Voltar ao Portal dos Pais</a>
</div>

<script src="/config.js"></script>
<script>
const API = CONFIG.SUPABASE_URL + '/functions/v1/api';
const H = { 'Content-Type': 'application/json', 'apikey': CONFIG.SUPABASE_ANON, 'Authorization': 'Bearer ' + CONFIG.SUPABASE_ANON };

// Definição dos portais com módulos necessários (gating por escola, não por role)
const PORTAIS = [
  { href: 'gerente.html', icon: '👔', iconBg: 'rgba(200,16,46,.1)', iconColor: 'var(--red)',
    title: 'Painel do Gerente', desc: 'Gestão e administração geral da escola.',
    modulo: null },
  { href: 'professora.html', icon: '👩‍🏫', iconBg: 'rgba(26,107,181,.1)', iconColor: '#1a6bb5',
    title: 'Portal das Professoras', desc: 'Atividades do corpo docente da escola.',
    modulo: null },
  { href: 'secretaria.html', icon: '📋', iconBg: 'rgba(45,122,58,.1)', iconColor: '#2d7a3a',
    title: 'Portal da Equipe', desc: 'Secretaria, CRM comercial, leads, funil e metas.',
    modulo: null },
  { href: 'aluno.html', icon: '🎓', iconBg: 'rgba(26,107,181,.1)', iconColor: '#1a6bb5',
    title: 'Portal do Aluno', desc: 'Notas, frequência, provas e calendário.',
    modulo: 'portal_aluno' },
];

function renderPortais(modulos) {
  const el = document.getElementById('portais');
  el.innerHTML = PORTAIS.map(p => {
    const hasAccess = !p.modulo || !modulos || modulos.includes(p.modulo);
    return `<a href="${p.href}" class="portal-card${hasAccess ? '' : ' disabled'}">
      <div class="portal-icon" style="background:${p.iconBg};color:${p.iconColor};">${p.icon}</div>
      <div class="portal-info">
        <h3>${p.title}</h3>
        <p>${p.desc}${!hasAccess ? ' <em style="color:#999;">(não contratado)</em>' : ''}</p>
      </div>
      <span class="portal-arrow">→</span>
    </a>`;
  }).join('');
}

// Render imediato (sem gating) — atualiza quando módulos chegarem
document.getElementById('brandName').textContent = 'Escola';
renderPortais(null);

const post = (body) => fetch(API, { method: 'POST', headers: H, body: JSON.stringify(body) }).then(r => r.json());

// Config da escola (não bloqueia portais)
post({ action: 'config_publica' }).then(cfg => {
  const nome = cfg.escola_nome || 'Escola';
  const icone = cfg.escola_icone || '🍁';
  document.getElementById('pageTitle').textContent = nome + ' — Área Restrita';
  document.getElementById('brandName').textContent = nome;
  document.getElementById('brandLeaf').textContent = icone;
  if (cfg.cor_primaria) document.documentElement.style.setProperty('--red', cfg.cor_primaria);
}).catch(() => {});

// Módulos habilitados — re-renderiza ao chegar
post({ action: 'modulos_habilitados' }).then(d => {
  if (d && Array.isArray(d.modulos)) renderPortais(d.modulos);
}).catch(() => {});

// Saudação — todos os tokens em paralelo
const tokens = [
  localStorage.getItem('mb_token'),
  localStorage.getItem('sec_token'),
  localStorage.getItem('prof_token'),
].filter(Boolean);
Promise.all(tokens.map(token =>
  post({ action: 'hub_whoami', _token: token }).catch(() => null)
)).then(results => {
  const d = results.find(x => x && x.logged);
  if (d) document.getElementById('userGreeting').textContent = `Olá, ${d.nome || d.email}`;
});
</script>
<script src="/lumied-ux.js" defer></script>
</body>
</html>
