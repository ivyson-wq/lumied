<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Lumied — Portal do Aluno</title>
  <link rel="icon" href="/favicon.png">
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #faf8f5; color: #1a1a1a; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border: 1px solid #e9e2d6; border-radius: 16px; padding: 32px 28px; max-width: 420px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.04); }
    .card h1 { font-family: 'Lora', serif; font-size: 22px; margin: 0 0 12px; }
    .card p { font-size: 14px; color: #666; line-height: 1.6; margin: 0 0 18px; }
    .btn { display: inline-block; padding: 12px 22px; background: #C8102E; color: #fff; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 14px; }
    .muted { font-size: 12px; color: #999; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎓 Portal unificado</h1>
    <p>O portal do aluno foi unificado com o portal da família. Use seu e-mail para receber o link de acesso e entre na aba <strong>Aluno</strong>.</p>
    <a class="btn" href="/familia.html">Ir para o portal</a>
    <p class="muted">Redirecionando automaticamente…</p>
  </div>
  <script>
    try { localStorage.removeItem('mb_aluno_token'); } catch (e) {}
    setTimeout(function () { window.location.replace('/familia.html'); }, 1200);
  </script>
</body>
</html>
