<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 50" width="230" height="50">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="50%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#F59E0B;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0"/>
    </radialGradient>
    <filter id="f"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Badge icon -->
  <rect x="4" y="6" width="36" height="36" rx="9" fill="url(#grad)"/>
  <path d="M14 13 L14 30 L27 30 L27 26 L18 26 L18 13Z" fill="#0F172A"/>

  <!-- Text -->
  <text x="48" y="33" font-family="'Inter',system-ui,sans-serif"
        font-size="30" font-weight="700" fill="#F1F5F9" letter-spacing="-1">Lumi</text>
  <text x="130" y="33" font-family="'Inter',system-ui,sans-serif"
        font-size="30" font-weight="300" fill="url(#grad)" letter-spacing="-1">ed</text>

  <!-- Glowing dot on the i -->
  <circle cx="119" cy="14" r="3" fill="url(#glow)" filter="url(#f)"/>
</svg>