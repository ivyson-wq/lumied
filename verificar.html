<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificar Documento — Lumied</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#f5f3ee;color:#1a1a1a;min-height:100vh;}
.topbar{background:#1c1712;padding:14px 24px;display:flex;align-items:center;gap:10px;}
.topbar .leaf{font-size:20px;}.topbar h1{font-family:'Lora',serif;font-size:15px;color:#fff;}
.topbar span{font-size:11px;color:rgba(255,255,255,.4);}
.container{max-width:560px;margin:48px auto;padding:0 16px;}
.card{background:#fff;border-radius:12px;border:1px solid #e2dbd1;padding:32px;box-shadow:0 4px 16px rgba(0,0,0,.06);}
.card h2{font-family:'Lora',serif;font-size:20px;margin-bottom:8px;}
.card p{font-size:13px;color:#7a7169;margin-bottom:24px;line-height:1.6;}
.input-row{display:flex;gap:8px;}
.input-row input{flex:1;padding:12px 14px;border:1.5px solid #e2dbd1;border-radius:8px;font-family:inherit;font-size:15px;text-transform:uppercase;letter-spacing:1px;outline:none;text-align:center;}
.input-row input:focus{border-color:#2d7a3a;}
.input-row button{padding:12px 24px;background:#2d7a3a;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
#result{margin-top:24px;display:none;}
.result-valid{background:#D4EDDA;border:1px solid #C3E6CB;border-radius:10px;padding:20px;}
.result-valid .icon{font-size:36px;margin-bottom:8px;}
.result-valid h3{color:#155724;font-family:'Lora',serif;font-size:17px;margin-bottom:12px;}
.result-valid .detail{font-size:12px;color:#155724;line-height:2;}
.result-invalid{background:#F8D7DA;border:1px solid #F5C6CB;border-radius:10px;padding:20px;text-align:center;}
.result-invalid .icon{font-size:36px;margin-bottom:8px;}
.result-invalid h3{color:#721C24;font-family:'Lora',serif;font-size:17px;}
.result-invalid p{font-size:13px;color:#721C24;}
.footer{text-align:center;font-size:11px;color:#7a7169;padding:24px;margin-top:32px;}
</style>
<!-- Google tag (gtag.js) -->
<script src="/analytics.js" defer></script>
</head>
<body>
<div class="topbar">
  <img src="/lumied-logo-branco.png" style="height:28px;object-fit:contain;" alt="Lumied">
  <div><h1>Maple Bear</h1><span>Verificação de Documento</span></div>
</div>

<div class="container">
  <div class="card">
    <h2>🔍 Verificar Autenticidade</h2>
    <p>Insira o código de verificação que aparece no selo do documento assinado para confirmar sua autenticidade.</p>
    <div class="input-row">
      <input type="text" id="codigoInput" placeholder="LUM-XXXXXXXX" maxlength="12">
      <button onclick="verificar()">Verificar</button>
    </div>
    <div id="result"></div>
  </div>
</div>

<div class="footer">Lumied Gestão Escolar — Verificação de documentos eletrônicos</div>

<script src="/config.js"></script>
<script>
// Auto-fill from URL param
const params = new URLSearchParams(location.search);
const codigoUrl = params.get('c');
if (codigoUrl) { document.getElementById('codigoInput').value = codigoUrl; verificar(); }

async function verificar() {
  const codigo = document.getElementById('codigoInput').value.trim().toUpperCase();
  if (!codigo) return alert('Informe o código de verificação.');
  const resultDiv = document.getElementById('result');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = '<p style="text-align:center;color:#7a7169;padding:20px;">Verificando...</p>';

  try {
    const url = (typeof CONFIG !== 'undefined' ? CONFIG.SUPABASE_URL : '') + '/functions/v1/api';
    const anon = typeof CONFIG !== 'undefined' ? CONFIG.SUPABASE_ANON : '';
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': anon, 'Authorization': 'Bearer ' + anon },
      body: JSON.stringify({ action: 'contrato_verificar', codigo }),
    });
    const d = await r.json();

    if (d.error || !d.valido) {
      resultDiv.innerHTML = `<div class="result-invalid">
        <div class="icon">❌</div>
        <h3>Documento não encontrado</h3>
        <p>${d.error || 'O código informado não corresponde a nenhum documento assinado.'}</p>
      </div>`;
      return;
    }

    const c = d.contrato;
    const ass = (c.contrato_assinaturas || [])[0] || {};
    resultDiv.innerHTML = `<div class="result-valid">
      <div class="icon">✅</div>
      <h3>Documento Autêntico e Válido</h3>
      <div class="detail">
        <strong>Tipo:</strong> ${c.contrato_templates?.nome || 'Contrato'}<br>
        <strong>Signatário:</strong> ${ass.nome_signatario || c.familia_nome || '—'}<br>
        <strong>Data da Assinatura:</strong> ${c.assinado_em ? new Date(c.assinado_em).toLocaleString('pt-BR') : '—'}<br>
        <strong>Código:</strong> <span style="font-family:monospace;font-weight:700;">${c.codigo_verificacao}</span><br>
        <strong>Hash SHA-256:</strong> <span style="font-family:monospace;font-size:10px;word-break:break-all;">${c.documento_hash || '—'}</span><br>
        <strong>IP do Signatário:</strong> ${ass.ip || '—'}<br>
        <strong>Status:</strong> <span style="color:#2d7a3a;font-weight:700;">${c.status?.toUpperCase()}</span>
      </div>
    </div>`;
  } catch (e) {
    resultDiv.innerHTML = '<p style="text-align:center;color:#a00d24;">Erro ao verificar. Tente novamente.</p>';
  }
}

document.getElementById('codigoInput').addEventListener('keydown', e => { if (e.key === 'Enter') verificar(); });
</script>
</body>
</html>
